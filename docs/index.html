<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩票开奖查询</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
a{color:#60a5fa;text-decoration:none}a:hover{text-decoration:underline}

.nav{background:#1e293b;border-bottom:1px solid #334155;padding:0 16px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;gap:4px}
.nav-brand{font-size:16px;font-weight:700;color:#f1f5f9;margin-right:16px;white-space:nowrap}
.nav-links{display:flex;gap:2px;flex:1}
.nav-links a{padding:6px 12px;border-radius:6px;color:#94a3b8;font-size:13px;transition:all .2s;white-space:nowrap}
.nav-links a:hover{background:#334155;color:#f1f5f9;text-decoration:none}
.nav-links a.active{background:#3b82f6;color:#fff}
.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:12px;white-space:nowrap}
.refresh-btn:hover{border-color:#60a5fa;color:#e2e8f0}
.refresh-btn.success{border-color:#22c55e;color:#22c55e}

.container{max-width:1200px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:#94a3b8;background:#1e293b;border:1px solid #334155;transition:all .2s}
.tab:hover{border-color:#60a5fa;color:#e2e8f0}
.tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #334155}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1e293b;color:#94a3b8;font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid #334155;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #1e293b}
tbody tr:hover td{background:#1e293b}
tbody tr{cursor:pointer}

.balls{display:inline-flex;gap:4px;flex-wrap:wrap}
.ball{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700}
.ball-red{background:#ef4444;color:#fff}
.ball-blue{background:#3b82f6;color:#fff}

.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap}
.pagination button{padding:6px 12px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#e2e8f0;cursor:pointer;font-size:13px}
.pagination button:hover:not(:disabled){border-color:#60a5fa}
.pagination button:disabled{opacity:.4;cursor:default}
.page-nums{display:flex;gap:2px;flex-wrap:wrap}
.page-num{padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#94a3b8;background:#1e293b;border:1px solid #334155}
.page-num:hover{border-color:#60a5fa}
.page-num.active{background:#3b82f6;color:#fff;border-color:#3b82f6}

.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;margin-bottom:10px;color:#f1f5f9}

.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;text-align:center}
.stat-card .label{color:#64748b;font-size:11px;margin-bottom:4px}
.stat-card .value{color:#f1f5f9;font-size:18px;font-weight:700}
.stat-card .value.gold{color:#fbbf24}
.stat-card .sub{color:#64748b;font-size:10px;margin-top:2px}

.draw-header{text-align:center;padding:20px 0}
.draw-header h1{font-size:20px;color:#f1f5f9;margin-bottom:6px}
.draw-header .date{color:#94a3b8;font-size:13px}
.draw-balls{display:flex;justify-content:center;gap:6px;margin:16px 0;flex-wrap:wrap}
.draw-balls .ball{width:40px;height:40px;font-size:15px}
.draw-balls .sep{display:flex;align-items:center;color:#475569;font-size:18px;font-weight:300}
.stat-row{display:flex;justify-content:center;gap:24px;margin:12px 0;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .label{color:#94a3b8;font-size:11px;margin-bottom:2px}
.stat-item .value{color:#f1f5f9;font-size:15px;font-weight:600}
.highlight{color:#fbbf24;font-weight:600}

.check-section{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.check-section{grid-template-columns:1fr}}
textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:10px;font-size:13px;font-family:monospace;resize:vertical;min-height:160px}
textarea:focus{outline:none;border-color:#3b82f6}
select,input[type="text"]{background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;padding:6px 10px;font-size:13px}
select:focus,input:focus{outline:none;border-color:#3b82f6}

.btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#3b82f6;color:#fff}
.btn-primary:hover{background:#2563eb}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#334155;color:#e2e8f0}
.btn-secondary:hover{background:#475569}

.upload-zone{border:2px dashed #334155;border-radius:8px;padding:30px;text-align:center;color:#94a3b8;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#3b82f6;color:#e2e8f0}

.win{color:#fbbf24;font-weight:600}
.lose{color:#64748b}

.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.form-row label{color:#94a3b8;font-size:12px;white-space:nowrap}
.hint{color:#64748b;font-size:11px;margin-top:4px}
.summary{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}
.summary .tag{padding:3px 10px;border-radius:4px;font-size:12px;background:#334155}
.back-link{margin-bottom:12px}
.loading-box{text-align:center;padding:30px;color:#94a3b8}
.ticket-item{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:8px}
.ticket-item:hover{border-color:#475569}
.ticket-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ticket-label{font-weight:600;color:#f1f5f9;font-size:13px}
.ticket-meta{color:#64748b;font-size:11px}
.win-history{margin-top:8px}
.win-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:4px;font-size:12px}
.win-row:nth-child(odd){background:rgba(59,130,246,.05)}
.win-row .code{color:#60a5fa}
.win-row .prize{color:#fbbf24}
.win-row .date{color:#64748b}
.empty-state{text-align:center;padding:40px;color:#475569}
.refresh-toast{position:fixed;top:64px;right:16px;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;max-width:300px;animation:slideIn .3s}
.refresh-toast.success{background:#166534;color:#bbf7d0;border:1px solid #22c55e}
.refresh-toast.error{background:#7f1d1d;color:#fecaca;border:1px solid #ef4444}
.refresh-toast.info{background:#1e3a5f;color:#bfdbfe;border:1px solid #3b82f6}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<div id="app">
<nav class="nav">
  <div class="nav-brand">彩票查询</div>
  <div class="nav-links">
    <router-link to="/" :class="{active:$route.path==='/'}">开奖记录</router-link>
    <router-link to="/check" :class="{active:$route.path==='/check'}">兑奖</router-link>
    <router-link to="/my" :class="{active:$route.path==='/my'}">我的号码</router-link>
  </div>
  <button class="refresh-btn" :class="{success:refreshOk}" @click="refreshData" :disabled="refreshing">
    {{refreshing?'刷新中...':'刷新数据'}}
  </button>
</nav>
<div class="container">
  <div v-if="toast" class="refresh-toast" :class="toast.type">{{toast.msg}}</div>
  <router-view></router-view>
</div>
</div>

<script>
const {createApp,ref,computed,onMounted,watch,nextTick}=Vue;
const {createRouter,createWebHashHistory}=VueRouter;

const DATA_URL='./data/lottery_data.json';
const SSQ_API='https://www.cwl.gov.cn/cwl_admin/front/cwlkj/search/kjxx/findDrawNotice';
const DLT_API='https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry';
const SSQ_NAMES={1:'一等奖',2:'二等奖',3:'三等奖',4:'四等奖',5:'五等奖',6:'六等奖'};
const DLT_NAMES={1:'一等奖',2:'二等奖',3:'三等奖',4:'四等奖',5:'五等奖',6:'六等奖',7:'七等奖',8:'八等奖',9:'九等奖'};

function formatMoney(v){if(!v)return'-';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toLocaleString()}
function parseMoneyInt(s){if(!s)return 0;if(s==='浮动')return 0;s=String(s).replace(/[,，]/g,'');const n=parseInt(s);return isNaN(n)?0:n}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

// --- Checking ---
function checkSSQ(ticket,draw){
  const tR=new Set(ticket.red.split(',')),tB=ticket.blue,dR=new Set(draw.red.split(',')),dB=draw.blue;
  let rm=0;tR.forEach(n=>{if(dR.has(n))rm++});const bm=tB===dB?1:0;
  let p=null;
  if(rm===6&&bm===1)p=1;else if(rm===6&&bm===0)p=2;else if(rm===5&&bm===1)p=3;
  else if((rm===5&&bm===0)||(rm===4&&bm===1))p=4;
  else if((rm===4&&bm===0)||(rm===3&&bm===1))p=5;
  else if(bm===1)p=6;
  if(!p)return null;
  let amt='浮动';
  const grades=draw.prize_grades_parsed||[];
  for(const g of grades){
    if(Number(g.type)===p){const m=g.typemoney||g.amount||'';if(m&&m!=='0')amt=m;break}
  }
  // Fallback: try parsing prize_grades string if parsed is empty
  if(amt==='浮动'&&!grades.length&&draw.prize_grades){
    try{const pg=JSON.parse(draw.prize_grades);for(const g of pg){if(Number(g.type)===p){amt=g.typemoney||'浮动';break}}}catch(e){}
  }
  return{prize:p,name:SSQ_NAMES[p],amount:amt};
}
function checkDLT(ticket,draw){
  const tF=new Set(ticket.front.split(',')),tB=new Set(ticket.back.split(',')),dF=new Set(draw.front.split(',')),dB=new Set(draw.back.split(','));
  let fm=0,bm=0;tF.forEach(n=>{if(dF.has(n))fm++});tB.forEach(n=>{if(dB.has(n))bm++});
  let p=null;
  if(fm===5&&bm===2)p=1;else if(fm===5&&bm===1)p=2;else if(fm===5&&bm===0)p=3;
  else if(fm===4&&bm===2)p=4;else if(fm===4&&bm===1)p=5;else if(fm===3&&bm===2)p=6;
  else if((fm===4&&bm===0)||(fm===3&&bm===1)||(fm===2&&bm===2))p=7;
  else if((fm===3&&bm===0)||(fm===2&&bm===1)||(fm===1&&bm===2)||(fm===0&&bm===2))p=8;
  else if((fm===2&&bm===0)||(fm===1&&bm===1)||(fm===0&&bm===1))p=9;
  if(!p)return null;
  let amt='浮动';
  const target=DLT_NAMES[p];
  const grades=draw.prize_grades_parsed||[];
  for(const g of grades){
    const lv=String(g.level||'');
    // Match exact level name, excluding 追加 entries
    if(lv&&lv.includes(target)&&!lv.includes('追加')&&!lv.includes('追加')){
      const m=g.amount||g.typemoney||'';if(m)amt=m;break;
    }
  }
  if(amt==='浮动'&&!grades.length&&draw.prize_grades){
    try{const pg=JSON.parse(draw.prize_grades);for(const g of pg){const lv=String(g.level||'');if(lv.includes(target)&&!lv.includes('追加')&&!lv.includes('追加')){amt=g.amount||'浮动';break}}}catch(e){}
  }
  return{prize:p,name:DLT_NAMES[p],amount:amt};
}
function checkTicket(lottery,ticket,draw){return lottery==='ssq'?checkSSQ(ticket,draw):checkDLT(ticket,draw)}

function parseLine(line,lt){
  line=line.replace(/ \+ /g,'|').replace(/\+/g,'|');const parts=line.split('|');
  if(lt==='ssq'){
    if(parts.length===2){const r=parts[0].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);const b=parts[1].trim().replace(/ /g,'');if(r.length===6&&b)return{red:r.map(n=>n.padStart(2,'0')).join(','),blue:b.padStart(2,'0')}}
    else{const n=line.replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(n.length===7)return{red:n.slice(0,6).map(x=>x.padStart(2,'0')).join(','),blue:n[6].padStart(2,'0')}}
  }else{
    if(parts.length===2){const f=parts[0].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);const b=parts[1].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(f.length===5&&b.length===2)return{front:f.map(n=>n.padStart(2,'0')).join(','),back:b.map(n=>n.padStart(2,'0')).join(',')}}
    else{const n=line.replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(n.length===7)return{front:n.slice(0,5).map(x=>x.padStart(2,'0')).join(','),back:n.slice(5,7).map(x=>x.padStart(2,'0')).join(',')}}
  }
  return null;
}

// --- Storage ---
function loadTickets(){try{return JSON.parse(localStorage.getItem('lottery_tickets')||'[]')}catch{return[]}}
function saveTickets(t){localStorage.setItem('lottery_tickets',JSON.stringify(t))}

// --- Shared state ---
const allData=ref(null);
const toast=ref(null);
const refreshing=ref(false);
const refreshOk=ref(false);
function showToast(msg,type='info',dur=3000){toast.value={msg,type};setTimeout(()=>{toast.value=null},dur)}

async function loadData(){
  if(allData.value)return allData.value;
  const r=await fetch(DATA_URL);allData.value=await r.json();return allData.value;
}

// --- Components ---
const DrawList={
  setup(){
    const lottery=ref('ssq'),page=ref(1),pageSize=30,loading=ref(true),codeSearch=ref(''),filtered=ref([]);
    async function init(){loading.value=true;try{const d=await loadData();filtered.value=d[lottery.value]||[]}catch(e){filtered.value=[]}finally{loading.value=false}}
    function switchLottery(lt){lottery.value=lt;page.value=1;codeSearch.value='';init()}
    function searchCode(){page.value=1;const d=allData.value;if(!d)return;const items=d[lottery.value]||[];filtered.value=codeSearch.value?items.filter(d=>d.code.includes(codeSearch.value)):items}
    const total=computed(()=>filtered.value.length),totalPages=computed(()=>Math.ceil(total.value/pageSize));
    const items=computed(()=>{const s=(page.value-1)*pageSize;return filtered.value.slice(s,s+pageSize)});
    function goto(p){if(p<1||p>totalPages.value)return;page.value=p;window.scrollTo({top:0,behavior:'smooth'})}
    const pageNumbers=computed(()=>{const pages=[];const tp=totalPages.value,cp=page.value;let s=Math.max(1,cp-3),e=Math.min(tp,cp+3);if(s>1)pages.push(1);if(s>2)pages.push('...');for(let i=s;i<=e;i++)pages.push(i);if(e<tp-1)pages.push('...');if(e<tp)pages.push(tp);return pages});
    onMounted(init);
    return{lottery,page,items,total,totalPages,loading,codeSearch,switchLottery,goto,searchCode,pageNumbers,formatMoney};
  },
  template:`<div>
  <div class="tabs"><div class="tab" :class="{active:lottery==='ssq'}" @click="switchLottery('ssq')">双色球</div><div class="tab" :class="{active:lottery==='dlt'}" @click="switchLottery('dlt')">大乐透</div></div>
  <div class="form-row" style="margin-bottom:12px"><label>期号:</label><input type="text" v-model="codeSearch" @keyup.enter="searchCode" placeholder="输入期号..."><button class="btn btn-secondary btn-sm" @click="searchCode">搜索</button><button class="btn btn-secondary btn-sm" v-if="codeSearch" @click="codeSearch='';searchCode()">清除</button></div>
  <div v-if="loading" class="loading-box">加载中...</div>
  <div v-else-if="!items.length" class="loading-box">暂无数据</div>
  <div v-else>
    <div class="table-wrap"><table><thead><tr><th>期号</th><th>日期</th><th>开奖号码</th><th>销售额</th><th>奖池</th></tr></thead>
    <tbody><tr v-for="d in items" :key="d.code" @click="$router.push('/draw/'+lottery+'/'+d.code)">
      <td>{{d.code}}</td><td>{{d.draw_date}}</td><td>
        <span class="balls" v-if="lottery==='ssq'"><span v-for="n in (d.red||'').split(',')" class="ball ball-red">{{n}}</span><span class="ball ball-blue">{{d.blue}}</span></span>
        <span class="balls" v-else><span v-for="n in (d.front||'').split(',')" class="ball ball-red">{{n}}</span><span v-for="n in (d.back||'').split(',')" class="ball ball-blue">{{n}}</span></span>
      </td><td>{{formatMoney(d.sales)}}</td><td>{{formatMoney(d.pool_money)}}</td>
    </tr></tbody></table></div>
    <div class="pagination"><button :disabled="page<=1" @click="goto(page-1)">上一页</button>
      <div class="page-nums"><span v-for="p in pageNumbers" :key="p" :class="['page-num',{active:p===page}]" @click="typeof p==='number'&&goto(p)">{{p}}</span></div>
      <span>共{{total}}期</span><button :disabled="page>=totalPages" @click="goto(page+1)">下一页</button></div>
  </div></div>`
};

const DrawDetail={
  setup(){
    const route=VueRouter.useRoute();const draw=ref(null);const loading=ref(true);
    onMounted(async()=>{loading.value=true;try{const d=await loadData();draw.value=(d[route.params.lottery]||[]).find(d=>d.code===route.params.code)||null}catch(e){console.error(e)}finally{loading.value=false}});
    const prizes=computed(()=>draw.value?.prize_grades_parsed||[]);
    return{draw,loading,prizes,lottery:route.params.lottery,formatMoney,ssqName:t=>SSQ_NAMES[t]||('奖'+t)};
  },
  template:`<div><div class="back-link"><router-link to="/">&larr; 返回</router-link></div>
  <div v-if="loading" class="loading-box">加载中...</div>
  <div v-else-if="!draw" class="loading-box" style="color:#f87171">未找到</div>
  <div v-else>
    <div class="card"><div class="draw-header">
      <h1>{{lottery==='ssq'?'双色球':'大乐透'}} 第{{draw.code}}期</h1>
      <div class="date">{{draw.draw_date}}</div>
      <div class="draw-balls">
        <template v-if="lottery==='ssq'"><span v-for="n in (draw.red||'').split(',')" class="ball ball-red">{{n}}</span><span class="sep">|</span><span class="ball ball-blue">{{draw.blue}}</span></template>
        <template v-else><span v-for="n in (draw.front||'').split(',')" class="ball ball-red">{{n}}</span><span class="sep">|</span><span v-for="n in (draw.back||'').split(',')" class="ball ball-blue">{{n}}</span></template>
      </div>
      <div class="stat-row"><div class="stat-item"><div class="label">销售额</div><div class="value">{{formatMoney(draw.sales)}}</div></div><div class="stat-item"><div class="label">奖池</div><div class="value">{{formatMoney(draw.pool_money)}}</div></div></div>
    </div></div>
    <div class="card" v-if="prizes.length"><h2>奖项明细</h2><div class="table-wrap"><table><thead><tr><th>奖项</th><th>注数</th><th>单注金额</th><th v-if="lottery==='dlt'">总金额</th></tr></thead>
    <tbody><tr v-for="p in prizes" :key="p.type||p.level"><td class="highlight">{{p.type?ssqName(p.type):(p.level||'')}}</td><td>{{p.typenum||p.count||'-'}}</td><td>{{p.typemoney||p.amount||'-'}}</td><td v-if="lottery==='dlt'">{{p.total||'-'}}</td></tr></tbody></table></div></div>
  </div></div>`
};

const CheckPage={
  setup(){
    const lottery=ref('ssq'),code=ref(''),codes=ref([]),inputText=ref(''),results=ref(null),loading=ref(true),checking=ref(false),error=ref(''),dragover=ref(false);
    async function loadCodes(){loading.value=true;try{const d=await loadData();codes.value=(d[lottery.value]||[]).map(d=>d.code);if(codes.value.length&&!code.value)code.value=codes.value[0]}finally{loading.value=false}}
    function switchLottery(lt){lottery.value=lt;code.value='';results.value=null;loadCodes()}
    function doCheck(){
      if(!code.value){error.value='请选择期号';return}error.value='';checking.value=true;
      const lines=inputText.value.trim().split('\n').filter(l=>l.trim());const tickets=[];
      for(const l of lines){const p=parseLine(l.trim(),lottery.value);if(p)tickets.push(p)}
      if(!tickets.length){error.value='请输入有效号码';checking.value=false;return}
      const items=(allData.value||{})[lottery.value]||[];const draw=items.find(d=>d.code===code.value);
      if(!draw){error.value='未找到该期';checking.value=false;return}
      results.value={draw:{code:draw.code,draw_date:draw.draw_date,...(lottery.value==='ssq'?{red:draw.red,blue:draw.blue}:{front:draw.front,back:draw.back})},
        results:tickets.map(t=>{const r=checkTicket(lottery.value,t,draw);return r?{ticket:t,...r}:{ticket:t,prize:null,name:'未中奖',amount:'0'}})};
      checking.value=false;
    }
    async function handleUpload(e){const f=e.target.files[0]||(e.dataTransfer&&e.dataTransfer.files[0]);if(!f)return;dragover.value=false;inputText.value=await f.text()}
    onMounted(loadCodes);
    return{lottery,code,codes,inputText,results,loading,checking,error,dragover,switchLottery,doCheck,handleUpload};
  },
  template:`<div><h2 style="margin-bottom:16px;color:#f1f5f9">兑奖查询</h2>
  <div class="tabs" style="margin-bottom:12px"><div class="tab" :class="{active:lottery==='ssq'}" @click="switchLottery('ssq')">双色球</div><div class="tab" :class="{active:lottery==='dlt'}" @click="switchLottery('dlt')">大乐透</div></div>
  <div class="form-row"><label>期号:</label><select v-model="code" style="min-width:140px"><option v-for="c in codes" :key="c" :value="c">{{c}}</option></select><span v-if="loading" style="color:#94a3b8;font-size:12px">加载中...</span></div>
  <div class="check-section">
    <div class="card"><h2>输入号码</h2><p class="hint" style="margin-bottom:6px">{{lottery==='ssq'?'格式: 01 04 19 22 24 25 + 15':'格式: 01 05 12 20 25 + 03 08'}}，每行一组</p>
      <textarea v-model="inputText" :placeholder="lottery==='ssq'?'01 04 19 22 24 25 + 15':'01 05 12 20 25 + 03 08'"></textarea>
      <div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-primary" @click="doCheck" :disabled="checking">{{checking?'查询中...':'开始兑奖'}}</button>
      <button class="btn btn-secondary" @click="results=null;inputText=''" v-if="results">清除</button></div></div>
    <div class="card"><h2>文件导入</h2><p class="hint" style="margin-bottom:8px">.txt/.csv，每行一组</p>
      <div class="upload-zone" :class="{dragover}" @dragover.prevent="dragover=true" @dragleave="dragover=false" @drop.prevent="handleUpload($event)" @click="$refs.fileInput.click()">拖拽或点击选择文件</div>
      <input type="file" ref="fileInput" style="display:none" accept=".txt,.csv" @change="handleUpload($event)"></div>
  </div>
  <div v-if="error" style="color:#f87171;margin-top:8px;font-size:13px">{{error}}</div>
  <div v-if="results" class="card" style="margin-top:12px"><h2>兑奖结果</h2>
    <div style="margin-bottom:8px;color:#94a3b8;font-size:12px">开奖号码:
      <template v-if="lottery==='ssq'"><span class="balls"><span v-for="n in (results.draw.red||'').split(',')" class="ball ball-red" style="width:22px;height:22px;font-size:10px">{{n}}</span><span class="ball ball-blue" style="width:22px;height:22px;font-size:10px">{{results.draw.blue}}</span></span></template>
      <template v-else><span class="balls"><span v-for="n in (results.draw.front||'').split(',')" class="ball ball-red" style="width:22px;height:22px;font-size:10px">{{n}}</span><span v-for="n in (results.draw.back||'').split(',')" class="ball ball-blue" style="width:22px;height:22px;font-size:10px">{{n}}</span></span></template>
    </div>
    <div class="summary"><span class="tag">共{{results.results.length}}注</span><span class="tag" style="background:#854d0e;color:#fbbf24">中奖{{results.results.filter(r=>r.prize).length}}注</span></div>
    <div class="table-wrap"><table><thead><tr><th>#</th><th>号码</th><th>结果</th><th>金额</th></tr></thead>
    <tbody><tr v-for="(r,i) in results.results" :key="i"><td>{{i+1}}</td><td><template v-if="lottery==='ssq'">{{r.ticket.red}} + {{r.ticket.blue}}</template><template v-else>{{r.ticket.front}} + {{r.ticket.back}}</template></td>
    <td :class="r.prize?'win':'lose'">{{r.name}}</td><td :class="r.prize?'win':'lose'">{{r.amount}}{{r.prize?'元':''}}</td></tr></tbody></table></div>
  </div></div>`
};

// --- My Tickets Page ---
const MyTickets={
  setup(){
    const tickets=ref(loadTickets());
    const lottery=ref('ssq');
    const inputText=ref('');
    const label=ref('');
    const loading=ref(false);
    const expanded=ref({});
    const dataLoaded=ref(false);

    // Add tickets from input
    function addTickets(){
      const lines=inputText.value.trim().split('\n').filter(l=>l.trim());
      const parsed=[];
      for(const l of lines){const p=parseLine(l.trim(),lottery.value);if(p)parsed.push({id:uid(),lottery:lottery.value,numbers:p,label:label.value||(lottery.value==='ssq'?'双色球':'大乐透'),addedAt:new Date().toISOString().slice(0,10)})}
      if(!parsed.length){showToast('请输入有效号码','error');return}
      tickets.value=[...tickets.value,...parsed];saveTickets(tickets.value);
      inputText.value='';label.value='';
      showToast(`已添加 ${parsed.length} 注号码`,'success');
    }

    function removeTicket(id){tickets.value=tickets.value.filter(t=>t.id!==id);saveTickets(tickets.value);showToast('已删除','info')}

    function clearAll(){if(!confirm('确定删除所有号码？'))return;tickets.value=[];saveTickets(tickets.value)}

    // Check all tickets against all draws, compute stats
    const ticketStats=computed(()=>{
      if(!allData.value)return[];
      return tickets.value.map(tk=>{
        const draws=(allData.value[tk.lottery]||[]);
        const wins=[];
        for(const draw of draws){
          const r=checkTicket(tk.lottery,tk.numbers,draw);
          if(r)wins.push({code:draw.code,date:draw.date||draw.draw_date,prize:r.prize,name:r.name,amount:r.amount,amountInt:parseMoneyInt(r.amount)});
        }
        // Stats
        const totalWins=wins.length;
        const totalAmount=wins.reduce((s,w)=>s+w.amountInt,0);
        let latest=null,maxWin=null;
        for(const w of wins){
          if(!latest||w.date>latest.date||(w.date===latest.date&&w.code>latest.code))latest=w;
          if(!maxWin||w.amountInt>maxWin.amountInt||(w.amountInt===maxWin.amountInt&&w.date>maxWin.date))maxWin=w;
        }
        return{...tk,wins,totalWins,totalAmount,latest,maxWin};
      });
    });

    // Global stats
    const globalStats=computed(()=>{
      let totalTickets=tickets.value.length,totalWins=0,totalAmount=0,latestWin=null,maxWin=null;
      for(const ts of ticketStats.value){
        totalWins+=ts.totalWins;totalAmount+=ts.totalAmount;
        if(ts.latest&&(!latestWin||ts.latest.date>latestWin.date))latestWin=ts.latest;
        if(ts.maxWin&&(!maxWin||ts.maxWin.amountInt>maxWin.amountInt||(ts.maxWin.amountInt===maxWin.amountInt&&ts.maxWin.date>maxWin.date)))maxWin=ts.maxWin;
      }
      return{totalTickets,totalWins,totalAmount,latestWin,maxWin};
    });

    function toggleExpand(id){expanded.value[id]=!expanded.value[id]}

    function fmtNums(tk){
      if(tk.lottery==='ssq')return tk.numbers.red+' + '+tk.numbers.blue;
      return tk.numbers.front+' + '+tk.numbers.back;
    }

    onMounted(async()=>{await loadData();dataLoaded.value=true});

    return{tickets,lottery,inputText,label,loading,expanded,dataLoaded,ticketStats,globalStats,
           addTickets,removeTicket,clearAll,toggleExpand,fmtNums,formatMoney,parseMoneyInt};
  },
  template:`<div>
  <h2 style="margin-bottom:12px;color:#f1f5f9">我的号码</h2>

  <!-- Global stats -->
  <div class="stat-cards" v-if="tickets.length&&dataLoaded">
    <div class="stat-card"><div class="label">保存号码</div><div class="value">{{globalStats.totalTickets}}注</div></div>
    <div class="stat-card"><div class="label">累计中奖</div><div class="value gold">{{globalStats.totalWins}}次</div></div>
    <div class="stat-card"><div class="label">累计金额</div><div class="value gold">{{formatMoney(globalStats.totalAmount)}}</div></div>
    <div class="stat-card"><div class="label">最新中奖</div><div class="value" v-if="globalStats.latestWin">{{globalStats.latestWin.name}}<div class="sub">{{globalStats.latestWin.date}}</div></div><div class="value" v-else>-</div></div>
    <div class="stat-card"><div class="label">最大中奖</div><div class="value gold" v-if="globalStats.maxWin">{{globalStats.maxWin.name}} {{globalStats.maxWin.amount}}元<div class="sub">{{globalStats.maxWin.date}}</div></div><div class="value" v-else>-</div></div>
  </div>

  <!-- Add ticket form -->
  <div class="card">
    <h2>添加号码</h2>
    <div class="form-row"><label>彩种:</label><div class="tabs" style="margin:0"><div class="tab" :class="{active:lottery==='ssq'}" @click="lottery='ssq'">双色球</div><div class="tab" :class="{active:lottery==='dlt'}" @click="lottery='dlt'">大乐透</div></div></div>
    <div class="form-row"><label>备注:</label><input type="text" v-model="label" placeholder="可选，如 第1注" style="flex:1"></div>
    <p class="hint" style="margin-bottom:4px">{{lottery==='ssq'?'格式: 01 04 19 22 24 25 + 15':'格式: 01 05 12 20 25 + 03 08'}}，每行一组</p>
    <textarea v-model="inputText" :placeholder="lottery==='ssq'?'01 04 19 22 24 25 + 15':'01 05 12 20 25 + 03 08'" style="min-height:80px"></textarea>
    <div style="margin-top:8px;display:flex;gap:8px"><button class="btn btn-primary" @click="addTickets">添加</button>
      <button class="btn btn-danger btn-sm" @click="clearAll" v-if="tickets.length">清空全部</button></div>
  </div>

  <!-- Ticket list -->
  <div v-if="!dataLoaded" class="loading-box">加载数据中...</div>
  <div v-else-if="!tickets.length" class="empty-state">还没有保存号码，请先添加</div>
  <div v-else>
    <div v-for="ts in ticketStats" :key="ts.id" class="ticket-item">
      <div class="ticket-header">
        <div><span class="ticket-label">{{ts.label||'未命名'}}</span>
          <span class="balls" style="margin-left:8px">
            <template v-if="ts.lottery==='ssq'"><span v-for="n in (ts.numbers.red||'').split(',')" class="ball ball-red" style="width:22px;height:22px;font-size:10px">{{n}}</span><span class="ball ball-blue" style="width:22px;height:22px;font-size:10px">{{ts.numbers.blue}}</span></template>
            <template v-else><span v-for="n in (ts.numbers.front||'').split(',')" class="ball ball-red" style="width:22px;height:22px;font-size:10px">{{n}}</span><span v-for="n in (ts.numbers.back||'').split(',')" class="ball ball-blue" style="width:22px;height:22px;font-size:10px">{{n}}</span></template>
          </span>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span class="win" v-if="ts.totalWins">{{ts.totalWins}}次中奖</span>
          <span style="color:#64748b;font-size:11px" v-else>未中奖</span>
          <button class="btn btn-secondary btn-sm" @click="toggleExpand(ts.id)">{{expanded[ts.id]?'收起':'详情'}}</button>
          <button class="btn btn-danger btn-sm" @click="removeTicket(ts.id)">删除</button>
        </div>
      </div>
      <div class="ticket-meta" v-if="ts.totalWins">
        累计 {{formatMoney(ts.totalAmount)}} | 最新: {{ts.latest?.name}} {{ts.latest?.date}} | 最大: {{ts.maxWin?.name}} {{ts.maxWin?.amount}}元 ({{ts.maxWin?.date}})
      </div>
      <div class="win-history" v-if="expanded[ts.id]&&ts.wins.length">
        <div class="win-row" style="background:#1e293b;color:#94a3b8;font-weight:600"><span>期号</span><span>日期</span><span>奖项</span><span>金额</span></div>
        <div class="win-row" v-for="w in ts.wins" :key="w.code">
          <router-link :to="'/draw/'+ts.lottery+'/'+w.code" class="code">{{w.code}}</router-link>
          <span class="date">{{w.date}}</span>
          <span class="prize">{{w.name}}</span>
          <span class="prize">{{w.amount}}元</span>
        </div>
      </div>
      <div v-if="expanded[ts.id]&&!ts.wins.length" class="hint" style="padding:8px">暂未中奖</div>
    </div>
  </div></div>`
};

// --- App ---
const app=createApp({
  setup(){
    async function refreshData(){
      refreshing.value=true;refreshOk.value=false;
      let newDraws=0;
      // Try SSQ API
      try{
        const r=await fetch(SSQ_API+'?name=ssq&issueStart=2026001&issueEnd=2026999&pageNo=1&pageSize=100',{headers:{'Referer':'https://www.cwl.gov.cn/kjxx/ssq/kjgg/'}});
        const d=await r.json();
        if(d.state===0&&d.result){
          const existing=new Set((allData.value?.ssq||[]).map(x=>x.code));
          const items=d.result.filter(x=>!existing.has(x.code));
          if(items.length){allData.value.ssq=[...items.map(x=>({code:x.code,draw_date:x.date,red:x.red,blue:x.blue,sales:+x.sales,pool_money:+x.poolbalance,prize_grades:x.prizegrades,prize_grades_parsed:JSON.parse(x.prizegrades||'[]')})),...(allData.value?.ssq||[])];newDraws+=items.length}
        }
      }catch(e){console.log('SSQ API failed:',e.message)}
      // Try DLT API
      try{
        const r=await fetch(DLT_API+'?gameNo=85&provinceId=0&pageSize=20&pageNo=1&is498=true');
        const d=await r.json();
        const items=d.value?.list||[];
        const existing=new Set((allData.value?.dlt||[]).map(x=>x.code));
        const newItems=items.filter(x=>!existing.has(x.lotteryDrawNum));
        if(newItems.length){
          const parsed=newItems.map(x=>{const nums=x.lotteryDrawResult.trim().split(/\s+/);return{code:x.lotteryDrawNum,draw_date:x.lotteryDrawTime,front:nums.slice(0,5).join(','),back:nums.slice(5).join(','),sales:+(x.totalSaleAmount||'0').replace(/,/g,''),pool_money:int_float(x.poolBalanceAfterdraw||'0'),prize_grades:JSON.stringify((x.prizeLevelList||[]).map(p=>({level:p.prizeLevel,count:p.stakeCount,amount:p.stakeAmountFormat,total:p.totalPrizeamount}))),prize_grades_parsed:(x.prizeLevelList||[]).map(p=>({level:p.prizeLevel,count:p.stakeCount,amount:p.stakeAmountFormat,total:p.totalPrizeamount}))}});
          allData.value.dlt=[...parsed,...(allData.value?.dlt||[])];newDraws+=parsed.length}
      }catch(e){console.log('DLT API failed:',e.message)}

      refreshing.value=false;
      if(newDraws>0){refreshOk.value=true;showToast(`获取到 ${newDraws} 期新数据（仅本次会话有效）`,'success')}
      else{showToast('数据已是最新，或网络无法访问 API（请在本地运行 update_and_push.bat 更新）','info',5000)}
    }
    function int_float(v){try{return Math.round(parseFloat(v))}catch{return 0}}
    return{toast,refreshing,refreshOk,refreshData};
  }
});

const router=createRouter({history:createWebHashHistory(),routes:[
  {path:'/',component:DrawList},{path:'/draw/:lottery/:code',component:DrawDetail},
  {path:'/check',component:CheckPage},{path:'/my',component:MyTickets}
]});
app.use(router);app.mount('#app');
</script>
</body>
