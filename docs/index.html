<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>彩票开奖查询</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f2f4f6;color:#1e293b;min-height:100vh}
a{color:#2563eb;text-decoration:none}a:hover{text-decoration:underline}

.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 16px;display:flex;align-items:center;height:56px;position:sticky;top:0;z-index:100;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.nav-brand{font-size:16px;font-weight:700;color:#1e293b;margin-right:16px;white-space:nowrap}
.nav-links{display:flex;gap:2px;flex:1}
.nav-links a{padding:6px 12px;border-radius:6px;color:#64748b;font-size:13px;transition:all .2s;white-space:nowrap}
.nav-links a:hover{background:#f3f4f6;color:#1e293b;text-decoration:none}
.nav-links a.active{background:#2563eb;color:#fff}
.refresh-btn{padding:6px 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#64748b;cursor:pointer;font-size:12px;white-space:nowrap}
.refresh-btn:hover{border-color:#2563eb;color:#1e293b}
.refresh-btn.success{border-color:#16a34a;color:#16a34a}

.container{max-width:1200px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:4px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;font-weight:500;color:#64748b;background:#f3f4f6;border:1px solid #d1d5db;transition:all .2s}
.tab:hover{border-color:#2563eb;color:#1e293b}
.tab.active{background:#2563eb;color:#fff;border-color:#2563eb}

.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
th{background:#f9fafb;color:#64748b;font-weight:600;text-align:left;padding:10px 12px;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6}
tbody tr:hover td{background:#f8fafc}
tbody tr{cursor:pointer}

.balls{display:inline-flex;gap:4px;flex-wrap:wrap}
.ball{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:11px;font-weight:700}
.ball-red{background:#ef4444;color:#fff}
.ball-blue{background:#2563eb;color:#fff}

.pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;flex-wrap:wrap}
.pagination button{padding:6px 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#1e293b;cursor:pointer;font-size:13px}
.pagination button:hover:not(:disabled){border-color:#2563eb}
.pagination button:disabled{opacity:.4;cursor:default}
.page-nums{display:flex;gap:2px;flex-wrap:wrap}
.page-num{padding:4px 8px;border-radius:4px;cursor:pointer;font-size:12px;color:#64748b;background:#fff;border:1px solid #d1d5db}
.page-num:hover{border-color:#2563eb}
.page-num.active{background:#2563eb;color:#fff;border-color:#2563eb}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:20px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card h2{font-size:15px;margin-bottom:10px;color:#1e293b}

.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stat-card .label{color:#94a3b8;font-size:11px;margin-bottom:4px}
.stat-card .value{color:#1e293b;font-size:18px;font-weight:700}
.stat-card .value.gold{color:#d97706}
.stat-card .sub{color:#94a3b8;font-size:10px;margin-top:2px}

.draw-header{text-align:center;padding:20px 0}
.draw-header h1{font-size:20px;color:#1e293b;margin-bottom:6px}
.draw-header .date{color:#64748b;font-size:13px}
.draw-balls{display:flex;justify-content:center;gap:6px;margin:16px 0;flex-wrap:wrap}
.draw-balls .ball{width:40px;height:40px;font-size:15px}
.draw-balls .sep{display:flex;align-items:center;color:#b0b7c3;font-size:18px;font-weight:300}
.stat-row{display:flex;justify-content:center;gap:24px;margin:12px 0;flex-wrap:wrap}
.stat-item{text-align:center}
.stat-item .label{color:#64748b;font-size:11px;margin-bottom:2px}
.stat-item .value{color:#1e293b;font-size:15px;font-weight:600}
.highlight{color:#d97706;font-weight:600}

.check-section{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:768px){.check-section{grid-template-columns:1fr}}
textarea{width:100%;background:#fff;border:1px solid #d1d5db;border-radius:8px;color:#1e293b;padding:10px;font-size:13px;font-family:monospace;resize:vertical;min-height:160px}
textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select,input[type="text"]{background:#fff;border:1px solid #d1d5db;border-radius:6px;color:#1e293b;padding:6px 10px;font-size:13px}
select:focus,input:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}

.btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-secondary{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}
.btn-secondary:hover{background:#e5e7eb}

.upload-zone{border:2px dashed #d1d5db;border-radius:8px;padding:30px;text-align:center;color:#64748b;cursor:pointer;transition:all .2s}
.upload-zone:hover{border-color:#2563eb;color:#1e293b;background:#f8fafc}

.win{color:#d97706;font-weight:600}
.lose{color:#94a3b8}

.form-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.form-row label{color:#64748b;font-size:12px;white-space:nowrap}
.hint{color:#94a3b8;font-size:11px;margin-top:4px}
.summary{display:flex;gap:12px;margin:10px 0;flex-wrap:wrap}
.summary .tag{padding:3px 10px;border-radius:4px;font-size:12px;background:#f3f4f6;color:#374151}
.back-link{margin-bottom:12px}
.loading-box{text-align:center;padding:30px;color:#94a3b8}
.ticket-item{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.ticket-item:hover{border-color:#d1d5db}
.ticket-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ticket-label{font-weight:600;color:#1e293b;font-size:13px}
.ticket-meta{color:#94a3b8;font-size:11px}
.ticket-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:10px}
.ticket-stat{background:#f8fafc;border-radius:6px;padding:8px 10px;text-align:center}
.ticket-stat-label{color:#94a3b8;font-size:10px;margin-bottom:2px}
.ticket-stat-value{color:#1e293b;font-size:14px;font-weight:600}
.ticket-stat-value.gold{color:#d97706}
.ticket-stat-sub{color:#94a3b8;font-size:10px;margin-top:1px}
.win-history{margin-top:8px}
.win-row{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;border-radius:4px;font-size:12px}
.win-row:nth-child(odd){background:#f8fafc}
.win-row .code{color:#2563eb}
.win-row .prize{color:#d97706}
.win-row .date{color:#94a3b8}
.empty-state{text-align:center;padding:40px;color:#9ca3af}
.expand-btn{background:#eff6ff;border:1px solid #93c5fd;color:#2563eb;cursor:pointer;font-size:11px;padding:2px 8px;border-radius:4px;line-height:1;transition:all .2s;white-space:nowrap}
.expand-btn:hover{background:#2563eb;color:#fff}
.expand-btn.is-open{background:#fffbeb;border-color:#fcd34d;color:#d97706}
.expand-btn.is-open:hover{background:#f59e0b;color:#fff}
.expand-row td{background:#f9fafb;padding:0!important}
.prize-mini-table{padding:8px 16px 12px}
.prize-mini-table table{width:100%;font-size:12px}
.prize-mini-table th{background:#f3f4f6;color:#64748b;font-weight:500;text-align:left;padding:6px 10px}
.prize-mini-table td{padding:5px 10px;border-bottom:1px solid #f3f4f6}
.refresh-toast{position:fixed;top:64px;right:16px;padding:10px 16px;border-radius:8px;font-size:13px;z-index:200;max-width:300px;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.refresh-toast.success{background:#ecfdf5;color:#065f46;border:1px solid #86efac}
.refresh-toast.error{background:#fef2f2;color:#991b1b;border:1px solid #fca5a5}
.refresh-toast.info{background:#eff6ff;color:#1e40af;border:1px solid #93c5fd}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s}
.modal{background:#fff;border-radius:12px;padding:24px;max-width:480px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:16px;color:#1e293b;margin:0}
.modal-close{background:none;border:none;font-size:22px;color:#94a3b8;cursor:pointer;padding:0 4px;line-height:1}
.modal-close:hover{color:#1e293b}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app">
<nav class="nav">
  <div class="nav-brand">彩票查询</div>
  <div class="nav-links">
    <router-link to="/" :class="{active:$route.path==='/'}">开奖记录</router-link>
    <router-link to="/my" :class="{active:$route.path==='/my'}">我的号码</router-link>
  </div>
  <button class="refresh-btn" :class="{success:refreshOk}" @click="刷新数据" :disabled="refreshing">
    {{refreshing?'刷新中...':'刷新数据'}}
  </button>
</nav>
<div class="container">
  <div v-if="toast" class="refresh-toast" :class="toast.type">{{toast.msg}}</div>
  <router-view></router-view>
</div>
</div>

<script>
const {createApp,ref,computed,onMounted,watch,nextTick}=Vue;
const {createRouter,createWebHashHistory}=VueRouter;

const DATA_URL='./data/lottery_data.json';
const SSQ_API='https://www.cwl.gov.cn/cwl_admin/front/cwlkj/search/kjxx/findDrawNotice';
const DLT_API='https://webapi.sporttery.cn/gateway/lottery/getHistoryPageListV1.qry';
const SSQ_NAMES={1:'一等奖',2:'二等奖',3:'三等奖',4:'四等奖',5:'五等奖',6:'六等奖',7:'福运奖'};
const DLT_NAMES={1:'一等奖',2:'二等奖',3:'三等奖',4:'四等奖',5:'五等奖',6:'六等奖',7:'七等奖',8:'八等奖',9:'九等奖'};

function 双色球条件(t){const m={1:'6红+1蓝',2:'6红+0蓝',3:'5红+1蓝',4:'5红+0蓝 / 4红+1蓝',5:'4红+0蓝 / 3红+1蓝',6:'中蓝球(0红+1蓝)',7:'3红+0蓝(福运奖)'};return m[t]||''}
function 大乐透条件(name,code){
  // DLT 中奖条件(13个条件始终不变，按奖级分组因时期而异)
  const m={
    '一等奖': '5+2','二等奖': '5+1',
    '三等奖': code>='26014'?'5+0 / 4+2':code>='19019'?'5+0':'5+0',
    '四等奖': code>='26014'?'4+1':code>='19019'?'4+2':code>='14052'?'4+2 / 4+1 / 3+2':'4+2',
    '五等奖': code>='26014'?'4+0 / 3+2':code>='19019'?'4+1':code>='14052'?'4+0 / 3+1 / 2+2':'4+1',
    '六等奖': code>='26014'?'3+1 / 2+2':code>='19019'?'3+2':code>='14052'?'3+0 / 2+1 / 1+2 / 0+2':'4+0 / 3+2',
    '七等奖': code>='26014'?'3+0 / 2+1 / 1+2 / 0+2':code>='19019'?'4+0':code>='14052'?'':'3+1 / 2+2',
    '八等奖': code>='26014'?'':code>='19019'?'3+1 / 2+2':code>='14052'?'':'3+0 / 2+1 / 1+2 / 0+2',
    '九等奖': code>='26014'?'':code>='19019'?'3+0 / 2+1 / 1+2 / 0+2':code>='14052'?'':'',
  };
  if(!name)return'';const base=name.replace('(追加)','');
  return m[base]||'';
}

function 排序奖项(prizes){if(!prizes||!prizes.length||!prizes[0].level)return prizes||[];const o={'一等奖':1,'二等奖':2,'三等奖':3,'四等奖':4,'五等奖':5,'六等奖':6,'七等奖':7,'八等奖':8,'九等奖':9};return[...prizes].sort((a,b)=>{const la=o[(a.level||'').replace('(追加)','')]||99;const lb=o[(b.level||'').replace('(追加)','')]||99;if(la!==lb)return la-lb;return(a.level||'').includes('追加')?1:(b.level||'').includes('追加')?-1:0})};function 格式化金额(v){if(!v)return'-';if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v.toLocaleString()}
function 解析金额(s){if(!s)return 0;if(s==='浮动')return 0;s=String(s).replace(/[,，]/g,'');const n=parseInt(s);return isNaN(n)?0:n}
function 生成ID(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}

// --- Checking ---
function 有福运奖(draw){return Number(draw.code)>=2026014&&draw.pool_money>=300000000}
function 查双色球(ticket,draw){
  const tR=new Set(ticket.red.split(',')),tB=ticket.blue,dR=new Set(draw.red.split(',')),dB=draw.blue;
  let rm=0;tR.forEach(n=>{if(dR.has(n))rm++});const bm=tB===dB?1:0;
  let p=null;
  if(rm===6&&bm===1)p=1;else if(rm===6&&bm===0)p=2;else if(rm===5&&bm===1)p=3;
  else if((rm===5&&bm===0)||(rm===4&&bm===1))p=4;
  else if((rm===4&&bm===0)||(rm===3&&bm===1))p=5;
  else if(bm===1)p=6;
  else if(rm===3&&bm===0&&有福运奖(draw))p=7;
  if(!p)return null;
  let amt=p===7?'5':'浮动';
  const grades=draw.prize_grades_parsed||[];
  for(const g of grades){
    if(Number(g.type)===p){const m=g.typemoney||g.amount||'';if(m&&m!=='0')amt=m;break}
  }
  // Fallback: try parsing prize_grades string if parsed is empty
  if(amt==='浮动'&&!grades.length&&draw.prize_grades){
    try{const pg=JSON.parse(draw.prize_grades);for(const g of pg){if(Number(g.type)===p){amt=g.typemoney||'浮动';break}}}catch(e){}
  }
  return{prize:p,name:SSQ_NAMES[p],amount:amt};
}
function 查大乐透(ticket,draw){
  const tF=new Set(ticket.front.split(',')),tB=new Set(ticket.back.split(',')),dF=new Set(draw.front.split(',')),dB=new Set(draw.back.split(','));
  let fm=0,bm=0;tF.forEach(n=>{if(dF.has(n))fm++});tB.forEach(n=>{if(dB.has(n))bm++});
  const code=draw.code;
  let p=null;
  // DLT rule periods: <14052=8tiers, 14052-19018=6tiers, 19019-26013=9tiers, >=26014=7tiers
  if(code>='26014'){
    if(fm===5&&bm===2)p=1;else if(fm===5&&bm===1)p=2;
    else if(fm===5&&bm===0||(fm===4&&bm===2))p=3;
    else if(fm===4&&bm===1)p=4;
    else if(fm===4&&bm===0||(fm===3&&bm===2))p=5;
    else if(fm===3&&bm===1||(fm===2&&bm===2))p=6;
    else if(fm===3&&bm===0||(fm===2&&bm===1)||(fm===1&&bm===2)||(fm===0&&bm===2))p=7;
  }else if(code>='19019'){
    if(fm===5&&bm===2)p=1;else if(fm===5&&bm===1)p=2;else if(fm===5&&bm===0)p=3;
    else if(fm===4&&bm===2)p=4;else if(fm===4&&bm===1)p=5;else if(fm===3&&bm===2)p=6;
    else if(fm===4&&bm===0)p=7;
    else if(fm===3&&bm===1||(fm===2&&bm===2))p=8;
    else if(fm===3&&bm===0||(fm===2&&bm===1)||(fm===1&&bm===2)||(fm===0&&bm===2))p=9;
  }else if(code>='14052'){
    if(fm===5&&bm===2)p=1;else if(fm===5&&bm===1)p=2;else if(fm===5&&bm===0)p=3;
    else if(fm===4&&bm===2||(fm===4&&bm===1)||(fm===3&&bm===2))p=4;
    else if(fm===4&&bm===0||(fm===3&&bm===1)||(fm===2&&bm===2))p=5;
    else if(fm===3&&bm===0||(fm===2&&bm===1)||(fm===1&&bm===2)||(fm===0&&bm===2))p=6;
  }else{
    if(fm===5&&bm===2)p=1;else if(fm===5&&bm===1)p=2;else if(fm===5&&bm===0)p=3;
    else if(fm===4&&bm===2)p=4;else if(fm===4&&bm===1)p=5;
    else if(fm===4&&bm===0||(fm===3&&bm===2))p=6;
    else if(fm===3&&bm===1||(fm===2&&bm===2))p=7;
    else if(fm===3&&bm===0||(fm===2&&bm===1)||(fm===1&&bm===2)||(fm===0&&bm===2))p=8;
  }
  if(!p)return null;
  let amt='浮动';
  const target=DLT_NAMES[p];
  const grades=draw.prize_grades_parsed||[];
  for(const g of grades){
    const lv=String(g.level||'');
    if(lv&&lv.includes(target)&&!lv.includes('追加')){
      const m=g.amount||g.typemoney||'';if(m)amt=m;break;
    }
  }
  if(amt==='浮动'&&!grades.length&&draw.prize_grades){
    try{const pg=JSON.parse(draw.prize_grades);for(const g of pg){const lv=String(g.level||'');if(lv.includes(target)&&!lv.includes('追加')){amt=g.amount||'浮动';break}}}catch(e){}
  }
  return{prize:p,name:DLT_NAMES[p],amount:amt};
}
function 查号码(lottery,ticket,draw){return lottery==='ssq'?查双色球(ticket,draw):查大乐透(ticket,draw)}

function 解析号码(line,lt){
  line=line.replace(/ \+ /g,'|').replace(/\+/g,'|');const parts=line.split('|');
  if(lt==='ssq'){
    if(parts.length===2){const r=parts[0].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);const b=parts[1].trim().replace(/ /g,'');if(r.length===6&&b)return{red:r.map(n=>n.padStart(2,'0')).join(','),blue:b.padStart(2,'0')}}
    else{const n=line.replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(n.length===7)return{red:n.slice(0,6).map(x=>x.padStart(2,'0')).join(','),blue:n[6].padStart(2,'0')}}
  }else{
    if(parts.length===2){const f=parts[0].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);const b=parts[1].trim().replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(f.length===5&&b.length===2)return{front:f.map(n=>n.padStart(2,'0')).join(','),back:b.map(n=>n.padStart(2,'0')).join(',')}}
    else{const n=line.replace(/ /g,',').replace(/,,/g,',').split(',').filter(Boolean);if(n.length===7)return{front:n.slice(0,5).map(x=>x.padStart(2,'0')).join(','),back:n.slice(5,7).map(x=>x.padStart(2,'0')).join(',')}}
  }
  return null;
}

// --- Storage ---
function 读取号码(){try{return JSON.parse(localStorage.getItem('lottery_tickets')||'[]')}catch{return[]}}
function 存储号码(t){localStorage.setItem('lottery_tickets',JSON.stringify(t))}

// --- Shared state ---
const allData=ref(null);
const toast=ref(null);
const refreshing=ref(false);
const refreshOk=ref(false);
function 弹出提示(msg,type='info',dur=3000){toast.value={msg,type};setTimeout(()=>{toast.value=null},dur)}

async function 加载数据(){
  if(allData.value)return allData.value;
  const r=await fetch(DATA_URL);allData.value=await r.json();return allData.value;
}

// --- Components ---
const DrawList={
  setup(){
    const lottery=ref('ssq'),page=ref(1),pageSize=30,loading=ref(true),codeSearch=ref(''),expanded=ref({}),dataReady=ref(false);
    onMounted(async()=>{loading.value=true;try{await 加载数据();dataReady.value=true}catch(e){}finally{loading.value=false}});

const app=createApp({
  setup(){
    async function 请求JSON(url){
      // Try direct fetch first
      try{const r=await fetch(url,{signal:AbortSignal.timeout(8000)});if(r.ok)return await r.json()}catch(e){}
      // Fallback: CORS proxies
      const proxies=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
      for(const proxy of proxies){
        try{const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(10000)});if(r.ok){const t=await r.text();return JSON.parse(t)}}catch(e){}
      }
      return null;
    }

    async function 请求HTML(url){
      // Try CORS proxies for HTML pages
      const proxies=['https://corsproxy.io/?url=','https://api.allorigins.win/raw?url='];
      for(const proxy of proxies){
        try{const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(15000)});if(r.ok){return await r.text()}}catch(e){}
      }
      return null;
    }

    async function 抓取福运奖(code){
      // Fetch SSQ prize data from 500.com detail page to get 福运奖 (type 7)
      const short=code.slice(2); // 2026047 -> 26047
      const url='https://kaijiang.500.com/shtml/ssq/'+short+'.shtml';
      const html=await 请求HTML(url);
      if(!html)return null;
      try{
        const rows=html.match(/<tr[^>]*>([\s\S]*?)<\/tr>/gi)||[];
        const prizes=[];
        const order={'一等奖':1,'二等奖':2,'三等奖':3,'四等奖':4,'五等奖':5,'六等奖':6,'福运奖':7,'幸运奖':7};
        for(const row of rows){
          const cells=row.match(/<td[^>]*>([\s\S]*?)<\/td>/gi)||[];
          const vals=cells.map(c=>c.replace(/<[^>]+>/g,'').trim());
          if(vals.length>=3&&order[vals[0]]&&vals[1].replace(/,/g,'').trim()&&/^\d+$/.test(vals[1].replace(/,/g,'').trim())){
            prizes.push({type:order[vals[0]],typenum:vals[1].replace(/,/g,'').trim(),typemoney:vals[2].replace(/,/g,'').trim()});
          }
        }
        return prizes.length>=6?prizes:null;
      }catch(e){return null}
    }

    async function 刷新数据(){
      refreshing.value=true;refreshOk.value=false;
      await 加载数据();
      let newDraws=0;
      const year=new Date().getFullYear();
      // SSQ: fetch current year + recent draws
      try{
        const url=SSQ_API+'?name=ssq&issueStart='+year+'001&issueEnd='+year+'999&pageNo=1&pageSize=100';
        const d=await 请求JSON(url);
        if(d&&d.state===0&&d.result){
          const existing=new Set((allData.value.ssq||[]).map(x=>x.code));
          const items=d.result.filter(x=>!existing.has(x.code));
          if(items.length){
            const mapped=items.map(x=>{let pgParsed=[];try{pgParsed=JSON.parse(x.prizegrades||'[]')}catch(e){}return{code:x.code,draw_date:x.date,week_day:x.week||'',red:x.red,blue:x.blue,sales:+x.sales,pool_money:+x.poolbalance,content:x.content||'',prize_grades:x.prizegrades||'',prize_grades_parsed:有福运奖({code:x.code,pool_money:+x.poolbalance})?pgParsed.map(p=>p.type===7&&!p.typenum?{...p,typenum:'-',typemoney:'5'}:p):pgParsed}});
            // Fetch 福运奖 data from 500.com for draws that qualify
            const fuyunCodes=mapped.filter(d=>有福运奖(d)&&(!d.prize_grades_parsed.find(p=>p.type===7)||!d.prize_grades_parsed.find(p=>p.type===7)?.typenum||d.prize_grades_parsed.find(p=>p.type===7)?.typenum==='-'));
            if(fuyunCodes.length){
              const results=await Promise.allSettled(fuyunCodes.map(d=>抓取福运奖(d.code)));
              results.forEach((r,i)=>{
                if(r.status==='fulfilled'&&r.value){
                  fuyunCodes[i].prize_grades_parsed=r.value;
                  fuyunCodes[i].prize_grades=JSON.stringify(r.value);
                }
              });
            }
            allData.value={...allData.value,ssq:[...mapped,...allData.value.ssq]};newDraws+=items.length;
          }
        }
      }catch(e){console.log('SSQ refresh error:',e)}
      // DLT: fetch latest page
      try{
        const url=DLT_API+'?gameNo=85&provinceId=0&pageSize=50&pageNo=1&is498=true';
        const d=await 请求JSON(url);
        if(d&&d.value&&d.value.list){
          const existing=new Set((allData.value.dlt||[]).map(x=>x.code));
          const items=d.value.list.filter(x=>!existing.has(x.lotteryDrawNum));
          if(items.length){
            const mapped=items.map(x=>{
              const nums=x.lotteryDrawResult.trim().split(/\s+/);
              const pgParsed=(x.prizeLevelList||[]).map(p=>({level:p.prizeLevel,count:p.stakeCount,amount:p.stakeAmountFormat,total:p.totalPrizeamount}));
              return{code:x.lotteryDrawNum,draw_date:x.lotteryDrawTime,front:nums.slice(0,5).join(','),back:nums.slice(5).join(','),sales:+(x.totalSaleAmount||'0').replace(/,/g,''),pool_money:Math.round(parseFloat(x.poolBalanceAfterdraw||'0')),prize_grades:JSON.stringify(pgParsed),prize_grades_parsed:pgParsed};
            });
            allData.value={...allData.value,dlt:[...mapped,...allData.value.dlt]};newDraws+=mapped.length;
          }
        }
      }catch(e){console.log('DLT refresh error:',e)}

      refreshing.value=false;
      if(newDraws>0){refreshOk.value=true;弹出提示('已获取 '+newDraws+' 期新数据','success')}
      else{弹出提示('数据已是最新，无需更新','info')}
    }
    return{toast,refreshing,refreshOk,刷新数据};
  }
});

const router=createRouter({history:createWebHashHistory(),routes:[
  {path:'/',component:DrawList},{path:'/draw/:lottery/:code',component:DrawDetail},
  {path:'/my',component:MyTickets}
]});
app.config.errorHandler=(err,instance,info)=>{console.error('Vue error:',err,info);document.getElementById('app').innerHTML='<div style="padding:40px;text-align:center;color:#dc2626"><h2>页面出错了</h2><p style="color:#64748b;font-size:13px;margin-top:8px">请刷新页面重试</p><pre style="text-align:left;margin-top:16px;font-size:11px;color:#374151;background:#f3f4f6;padding:12px;border-radius:8px;overflow:auto">'+err.message+'</pre></div>'};app.use(router);app.mount('#app');
</script>
